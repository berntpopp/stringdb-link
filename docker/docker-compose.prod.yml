# Production docker-compose override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  stringdb-link:
    build: !reset null
    image: "${STRINGDB_LINK_IMAGE:?Set STRINGDB_LINK_IMAGE to ghcr.io/berntpopp/stringdb-link@sha256:<digest>}"
    pull_policy: missing
    container_name: !reset null
    env_file: !reset []

    # Production-specific environment variables
    environment:
      GF_HEALTHCHECK_HOST: localhost
      LOGGING__LEVEL: INFO
      LOGGING__FORMAT: json
      RELOAD: "false"
      ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","stringdb-link.genefoundry.org"]'
    
    # Remove development volume mounts
    volumes: []
    # Never publish a host port in prod: expose-only behind the reverse proxy.
    # `!reset` (not []) is required because Compose MERGES list fields across -f
    # overlays — a plain `ports: []` would leave the base ${PORT:-8000}:8000 map.
    ports: !reset []
    expose:
      - "8000"

    # Container & Deployment Hardening Standard v1 (§2-4): read-only rootfs with
    # an explicit tmpfs scratch, all capabilities dropped, no privilege
    # escalation, a real init for signal/zombie handling, and a PID cap.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true

    command: !reset null
    restart: on-failure

    # Production resource limits
    deploy: !override
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
    
    # Enhanced health check for production
    # Default header remains "Host: localhost"; GF_HEALTHCHECK_HOST lets CI
    # render the exact central healthcheck command without changing that value.
    healthcheck:
      test:
        ["CMD", "sh", "-c", "curl -f -H \"Host: $${GF_HEALTHCHECK_HOST}\" http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Production logging with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=stringdb-link,environment=production"
