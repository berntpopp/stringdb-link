# NPM (Nginx Proxy Manager) production deployment
# Usage: docker-compose -f docker-compose.yml -f docker-compose.npm.yml up -d

# Pin the compose project name so layering base+npm does not default to the
# parent dir ("docker") and collide with other services' default project.
name: stringdb-link-npm

services:
  stringdb-link:
    # Deploy pulls the released, attested image; it never builds from source.
    # `!reset` is required: the base compose file defines `build:`, and without this
    # the merged model would still be buildable.
    # Pin a digest, not a tag: there is no `latest`, and only a digest is immutable.
    build: !reset null
    image: ${STRINGDB_LINK_IMAGE:?Set STRINGDB_LINK_IMAGE to ghcr.io/berntpopp/stringdb-link@sha256:<digest>}
    pull_policy: missing

    # Production environment optimized for NPM
    environment:
      LOGGING__LEVEL: INFO
      LOGGING__FORMAT: json
      RELOAD: "false"

      # NPM-specific environment variables (loaded from .env.npm)
      PUBLIC_DOMAIN: "${PUBLIC_DOMAIN}"
      PUBLIC_URL: "${PUBLIC_URL}"
      CORS__ALLOW_ORIGINS: "${CORS__ALLOW_ORIGINS}"
      ALLOWED_HOSTS: '["localhost","127.0.0.1","::1","stringdb-link.genefoundry.org"]'
    
    # Remove the base host-port mapping - NPM handles external access. `!reset`
    # is required: a plain `ports: []` MERGES with (does not replace) the base
    # list, leaving ${PORT:-8000}:8000 published (collides with other host binds).
    ports: !reset []
    
    # Connect to NPM's shared network
    networks:
      - npm_shared
      - default
    
    # Run REST plus hosted MCP through the project CLI.
    command: ["stringdb-link", "server", "--transport", "unified", "--host", "0.0.0.0", "--port", "8000"]

    # Container & Deployment Hardening Standard v1 (§2-4): read-only rootfs with
    # an explicit tmpfs scratch, all capabilities dropped, no privilege
    # escalation, a real init, and a PID cap.
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    init: true
    pids_limit: 256

    # Production resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
          pids: 256
        reservations:
          memory: 512M
          cpus: '0.5'
    
    # Production health check
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: localhost", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    
    # Production logging
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service=stringdb-link,environment=production,proxy=npm"

# NPM shared network configuration
networks:
  npm_shared:
    external: true
    name: "${NPM_SHARED_NETWORK_NAME:-npm_default}"
